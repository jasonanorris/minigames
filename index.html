<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" id="theme-color" content="#101820">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MiniGames">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MiniGames</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/js/app.js" type="module"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <h1>MiniGames</h1>
        </div>
        <div class="header-actions">
          <span class="network-status" id="network-status" role="status" aria-label="Online" title="Online"></span>
          <span class="app-version" id="app-version" aria-label="App version"></span>
          <button class="icon-button refresh-button" id="refresh-button" type="button" aria-label="Refresh app" title="Refresh app">
            <span aria-hidden="true">↻</span>
          </button>
        </div>
      </header>

      <main class="app-main">
        <section class="game-library" aria-label="Games">
          <div class="game-list" id="game-list"></div>
        </section>

        <section class="game-stage" aria-labelledby="stage-title">
          <div class="stage-topbar">
            <div>
              <p class="eyebrow" id="stage-eyebrow">Play area</p>
              <h2 id="stage-title">Choose a game</h2>
            </div>
            <button class="icon-button" id="home-button" type="button" aria-label="Return to game list" hidden>
              <span aria-hidden="true">←</span>
            </button>
          </div>
          <div class="stage-content" id="game-stage" tabindex="-1">
            <p class="empty-state">Select a game from the list to get started.</p>
          </div>
        </section>
      </main>

      <button class="small-game-back" id="small-game-back" type="button" aria-label="Return to game list" hidden>
        <span aria-hidden="true">←</span>
        <span>Back</span>
      </button>

      <div class="launcher-controls">
        <img class="launcher-control launcher-dpad" src="assets/images/dpad.png" alt="">
        <img class="launcher-control launcher-startselect" src="assets/images/startselect.png" alt="">
        <div class="launcher-buttons" aria-label="Game controls">
          <button class="controller-button controller-button-a" type="button" data-control="a" aria-label="A button"></button>
          <button class="controller-button controller-button-b" type="button" data-control="b" aria-label="B button"></button>
        </div>
      </div>
    </div>
  </body>
</html>
